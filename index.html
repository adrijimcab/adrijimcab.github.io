<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adrián Jiménez | Software Architect</title>
    <style>
        :root {
            --bg: #0a0b10;
            --text: #f8f9fa;
            --accent: #00b4d8;
            --secondary: #6c757d;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        h1 { font-size: 3rem; margin-bottom: 0.5rem; }
        p { color: var(--secondary); font-size: 1.2rem; margin-top: 0; }
        .links { margin-top: 2rem; }
        a {
            color: var(--accent);
            text-decoration: none;
            border: 1px solid var(--accent);
            padding: 0.8rem 1.5rem;
            border-radius: 5px;
            transition: all 0.3s ease;
            font-weight: bold;
        }
        a:hover {
            background-color: var(--accent);
            color: var(--bg);
        }
        .status {
            margin-top: 3rem;
            font-size: 0.9rem;
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <h1>Adrián Jiménez</h1>
    <p>Software Architect | Full Stack Developer | AI Enthusiast</p>
    
    <div class="links">
        <a href="https://github.com/adrijimcab">Visit my GitHub Profile</a>
    </div>

    <div class="status">
        🚀 Site is currently under construction with a Modern Web Architecture.
    </div>
</body>
</html>
