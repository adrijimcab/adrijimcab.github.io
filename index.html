<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adrián Jiménez | Software Architect</title>
    
    <!-- Dynamic Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚀</text></svg>">
    
    <!-- SEO -->
    <meta name="description" content="Senior Software Architect specializing in AI Agents and Modern Web Architectures.">
    <meta property="og:title" content="Adrián Jiménez | Portfolio">
    <meta property="og:image" content="https://github.com/adrijimcab.png">
    
    <style>
        :root {
            --bg: #050505; --surface: #111111; --accent: #00b4d8; --text: #ffffff; --text-dim: #a0a0a0;
            --border: rgba(255, 255, 255, 0.1); --skeleton: #1a1a1a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Inter', -apple-system, sans-serif; line-height: 1.6; }
        .container { max-width: 900px; margin: 0 auto; padding: 4rem 2rem; }
        header { margin-bottom: 4rem; }
        .hero-title { font-size: clamp(2.5rem, 8vw, 4.5rem); font-weight: 800; letter-spacing: -2px; }
        .typewriter { color: var(--accent); font-family: monospace; height: 1.2rem; margin-top: 1rem; }
        
        section { margin-bottom: 5rem; }
        h2 { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 4px; color: var(--text-dim); margin-bottom: 2rem; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; }
        
        /* Grid & Cards */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem; }
        .card { background: var(--surface); border: 1px solid var(--border); padding: 1.5rem; border-radius: 12px; transition: 0.3s; height: 160px; display: flex; flex-direction: column; justify-content: space-between; }
        .card:hover { border-color: var(--accent); transform: translateY(-3px); }
        .card h3 { font-size: 1.1rem; color: var(--accent); margin-bottom: 0.5rem; }
        .card p { color: var(--text-dim); font-size: 0.85rem; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        
        /* Skeleton Animation */
        .skeleton { background: var(--skeleton); border-radius: 8px; position: relative; overflow: hidden; }
        .skeleton::after { content: ""; position: absolute; top: 0; right: 0; bottom: 0; left: 0; transform: translateX(-100%); background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent); animation: shimmer 1.5s infinite; }
        @keyframes shimmer { 100% { transform: translateX(100%); } }

        .metrics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        @media (max-width: 600px) { .metrics-grid { grid-template-columns: 1fr; } }
        
        footer { margin-top: 5rem; padding-top: 2rem; border-top: 1px solid var(--border); display: flex; justify-content: space-between; color: var(--text-dim); font-size: 0.8rem; }
        a { color: inherit; text-decoration: none; transition: 0.3s; }
        a:hover { color: var(--accent); }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1 class="hero-title">Adrián Jiménez.</h1>
            <div class="typewriter" id="typewriter"></div>
        </header>

        <section id="projects">
            <h2>Live Repositories</h2>
            <div class="grid" id="repo-grid">
                <!-- Skeletons -->
                <div class="card skeleton"></div>
                <div class="card skeleton"></div>
                <div class="card skeleton"></div>
                <div class="card skeleton"></div>
            </div>
        </section>

        <section id="stats">
            <h2>Dynamic Metrics</h2>
            <div class="metrics-grid">
                <img src="https://github-readme-stats.vercel.app/api?username=adrijimcab&show_icons=true&theme=tokyonight&hide_border=true&bg_color=050505" width="100%">
                <img src="https://github-readme-stats.vercel.app/api/top-langs/?username=adrijimcab&layout=compact&theme=tokyonight&hide_border=true&bg_color=050505" width="100%">
            </div>
        </section>

        <footer>
            <div>© 2026 adrijimcab</div>
            <div>
                <a href="#" onclick="copyEmail()">Copy Email</a> · 
                <a href="https://github.com/adrijimcab">GitHub</a> · 
                <a href="https://linkedin.com/in/adrianjimenezcabello">LinkedIn</a>
            </div>
        </footer>
    </div>

    <script>
        // Typewriter
        const text = "Architecting the future of AI and Web.";
        let i = 0;
        function type() {
            if (i < text.length) {
                document.getElementById("typewriter").innerHTML += text.charAt(i);
                i++; setTimeout(type, 50);
            }
        }
        window.onload = type;

        // Copy Email Function
        function copyEmail() {
            navigator.clipboard.writeText('adrian.jimenez.cab@hotmail.com');
            alert('Email copied to clipboard!');
        }

        // Fetch Repos
        async function fetchRepos() {
            try {
                const response = await fetch('https://api.github.com/users/adrijimcab/repos?sort=updated&per_page=6');
                const repos = await response.json();
                const grid = document.getElementById('repo-grid');
                grid.innerHTML = '';
                
                repos.filter(repo => !repo.fork && repo.name !== 'adrijimcab').forEach(repo => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <a href="${repo.html_url}" target="_blank" style="height:100%; display:flex; flex-direction:column; justify-content:space-between;">
                            <div>
                                <h3>${repo.name}</h3>
                                <p>${repo.description || 'Architectural exploration and development.'}</p>
                            </div>
                            <div style="font-size:0.7rem; color:var(--accent); font-weight:bold; text-transform:uppercase;">
                                ${repo.language || 'Code'} · ⭐ ${repo.stargazers_count}
                            </div>
                        </a>
                    `;
                    grid.appendChild(card);
                });
            } catch (e) {
                console.error("API Error", e);
            }
        }
        fetchRepos();
    </script>
</body>
</html>
