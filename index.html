<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adrián Jiménez | Software Architect</title>
    <meta name="description" content="Software Architect specialized in AI Agent ecosystems and Modern Web Architectures.">
    <style>
        :root {
            --bg: #050505; --surface: #111111; --accent: #00b4d8; --text: #ffffff; --text-dim: #a0a0a0;
            --border: rgba(255, 255, 255, 0.1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Inter', -apple-system, sans-serif; line-height: 1.6; }
        .container { max-width: 900px; margin: 0 auto; padding: 4rem 2rem; }
        header { margin-bottom: 4rem; animation: fadeIn 1s ease-out; }
        .hero-title { font-size: clamp(2.5rem, 8vw, 4.5rem); font-weight: 800; letter-spacing: -2px; line-height: 1; }
        .typewriter { color: var(--accent); font-family: monospace; font-size: 1.1rem; margin-top: 1rem; }
        section { margin-bottom: 5rem; }
        h2 { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 4px; color: var(--text-dim); margin-bottom: 2rem; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem; }
        .card { background: var(--surface); border: 1px solid var(--border); padding: 1.5rem; border-radius: 12px; transition: 0.3s; }
        .card:hover { border-color: var(--accent); transform: translateY(-3px); }
        .card h3 { margin-bottom: 0.5rem; font-size: 1.1rem; color: var(--accent); }
        .card p { color: var(--text-dim); font-size: 0.9rem; margin-bottom: 1rem; }
        .card-meta { font-size: 0.75rem; color: var(--accent); font-weight: bold; }
        .metrics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        @media (max-width: 600px) { .metrics-grid { grid-template-columns: 1fr; } }
        footer { margin-top: 5rem; padding-top: 2rem; border-top: 1px solid var(--border); display: flex; justify-content: space-between; color: var(--text-dim); font-size: 0.9rem; }
        a { color: inherit; text-decoration: none; transition: 0.3s; }
        a:hover { color: var(--accent); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1 class="hero-title">Adrián Jiménez.</h1>
            <div class="typewriter" id="typewriter"></div>
        </header>

        <section id="projects">
            <h2>Live Repositories</h2>
            <div class="grid" id="repo-grid">
                <!-- Data will be injected here -->
                <p>Loading real-time data from GitHub...</p>
            </div>
        </section>

        <section id="stats">
            <h2>Dynamic Metrics</h2>
            <div class="metrics-grid">
                <img src="https://github-readme-stats.vercel.app/api?username=adrijimcab&show_icons=true&theme=tokyonight&hide_border=true&bg_color=050505" width="100%">
                <img src="https://github-readme-stats.vercel.app/api/top-langs/?username=adrijimcab&layout=compact&theme=tokyonight&hide_border=true&bg_color=050505" width="100%">
            </div>
        </section>

        <footer>
            <div>© 2026 adrijimcab</div>
            <div><a href="https://github.com/adrijimcab">GitHub</a> · <a href="https://linkedin.com/in/adrianjimenezcabello">LinkedIn</a></div>
        </footer>
    </div>

    <script>
        // Typewriter Effect
        const text = "Architecting dynamic AI and Web systems.";
        let j = 0;
        function type() {
            if (j < text.length) {
                document.getElementById("typewriter").innerHTML += text.charAt(j);
                j++; setTimeout(type, 50);
            }
        }
        window.onload = type;

        // Fetch Real-time Repositories
        async function fetchRepos() {
            try {
                const response = await fetch('https://api.github.com/users/adrijimcab/repos?sort=updated&per_page=6');
                const repos = await response.json();
                const grid = document.getElementById('repo-grid');
                grid.innerHTML = '';
                
                repos.filter(repo => !repo.fork).forEach(repo => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <a href="${repo.html_url}" target="_blank">
                            <h3>${repo.name}</h3>
                            <p>${repo.description || 'No description provided.'}</p>
                            <div class="card-meta">${repo.language || 'Software'} · ⭐ ${repo.stargazers_count}</div>
                        </a>
                    `;
                    grid.appendChild(card);
                });
            } catch (e) {
                console.error("Error fetching repos", e);
            }
        }
        fetchRepos();
    </script>
</body>
</html>
